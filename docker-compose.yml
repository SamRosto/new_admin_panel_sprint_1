services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    container_name: movies_db
    restart: unless-stopped
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d movies_database"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./02_movies_admin
      dockerfile: Dockerfile
    container_name: movies_admin
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - static_volume:/opt/app/static
      - media_volume:/opt/app/media

  nginx:
    image: nginx:1.27-alpine
    container_name: movies_nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/opt/app/static:ro
      - media_volume:/opt/app/media:ro

  sqlite_to_postgres:
    build:
      context: ./03_sqlite_to_postgres
      dockerfile: Dockerfile
    container_name: sqlite_to_postgres
    working_dir: /app
    command: python main.py
    env_file:
    - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SQLITE_PATH: ${SQLITE_PATH}
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - import
  
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: movies_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    expose:
      - "9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
  etl:
    build:
      context: ./04_postgres_to_es
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ELASTIC_HOST: ${ES_HOST}
      ELASTIC_INDEX: ${ES_INDEX}
      STATE_FILE: ${/state/etl_state.json}
    restart: always
    volumes:
      - etl_state:/state
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

volumes:
  pg_data:
  static_volume:
  media_volume:
  etl_state: